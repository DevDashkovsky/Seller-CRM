openapi: 3.0.3
info:
  title: CRM API
  description: |
    Упрощённая CRM-система для управления продавцами и транзакциями.
    Реализация тестового задания ШИФТ Лаборатория.
  version: 1.0.0
  contact:
    name: ШИФТ Лаборатория CRM
servers:
  - url: http://localhost:8080
tags:
  - name: Sellers
    description: CRUD над продавцами
  - name: Transactions
    description: CRUD над транзакциями
  - name: Analytics
    description: Аналитические выборки по продавцам и транзакциям

paths:
  # ---------- SELLERS ----------
  /api/v1/sellers:
    get:
      tags: [Sellers]
      summary: Список продавцов
      description: Возвращает страницу продавцов. Удалённые (soft-delete) не включаются.
      operationId: listSellers
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - in: query
          name: name
          description: Подстрока для поиска по имени (case-insensitive)
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SellerPage'
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [Sellers]
      summary: Создать продавца
      operationId: createSeller
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SellerCreateRequest'
      responses:
        '201':
          description: Создано
          headers:
            Location:
              description: URI созданного ресурса
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/sellers/{id}:
    parameters:
      - $ref: '#/components/parameters/SellerId'
    get:
      tags: [Sellers]
      summary: Получить продавца по ID
      operationId: getSeller
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    put:
      tags: [Sellers]
      summary: Обновить продавца
      description: Частичное обновление — поля, переданные как null, не изменяются.
      operationId: updateSeller
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SellerUpdateRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SellerResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }
    delete:
      tags: [Sellers]
      summary: Удалить продавца (soft-delete)
      description: |
        Помечает продавца как удалённого. Запись остаётся в БД (историчность),
        но не возвращается в выборках.
      operationId: deleteSeller
      responses:
        '204':
          description: Удалено
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/sellers/{id}/transactions:
    parameters:
      - $ref: '#/components/parameters/SellerId'
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/SizeParam'
      - $ref: '#/components/parameters/SortParam'
    get:
      tags: [Sellers]
      summary: Транзакции конкретного продавца
      operationId: listSellerTransactions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionPage' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ---------- TRANSACTIONS ----------
  /api/v1/transactions:
    get:
      tags: [Transactions]
      summary: Список всех транзакций
      operationId: listTransactions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
        - $ref: '#/components/parameters/SortParam'
        - in: query
          name: paymentType
          required: false
          schema: { $ref: '#/components/schemas/PaymentType' }
        - in: query
          name: from
          description: Нижняя граница transactionDate (включительно)
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: to
          description: Верхняя граница transactionDate (включительно)
          required: false
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionPage' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }
    post:
      tags: [Transactions]
      summary: Создать транзакцию
      operationId: createTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransactionCreateRequest' }
      responses:
        '201':
          description: Создано
          headers:
            Location:
              description: URI созданного ресурса
              schema: { type: string, format: uri }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '404':
          description: Продавец не найден
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ApiError' }
        '409': { $ref: '#/components/responses/Conflict' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/transactions/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64, minimum: 1 }
        description: ID транзакции
    get:
      tags: [Transactions]
      summary: Получить транзакцию по ID
      operationId: getTransaction
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

  # ---------- ANALYTICS ----------
  /api/v1/analytics/top-seller:
    get:
      tags: [Analytics]
      summary: Самый продуктивный продавец за период
      description: |
        Возвращает продавца с максимальной суммой транзакций за указанный период.
        Период определяется парой (period, date): date — опорная дата, period — её гранулярность.
        Например, period=MONTH, date=2026-05-15 → май 2026.
      operationId: getTopSeller
      parameters:
        - in: query
          name: period
          required: true
          schema: { $ref: '#/components/schemas/PeriodType' }
        - in: query
          name: date
          required: true
          description: Опорная дата (любая дата внутри искомого периода)
          schema: { type: string, format: date }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TopSellerResponse' }
        '204':
          description: За период нет ни одной транзакции
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/analytics/sellers/below:
    get:
      tags: [Analytics]
      summary: Продавцы с суммой транзакций ниже порога
      description: |
        Возвращает продавцов, у которых суммарный объём транзакций за период
        строго меньше заданного порога threshold.
      operationId: getSellersBelowThreshold
      parameters:
        - in: query
          name: from
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: to
          required: true
          schema: { type: string, format: date-time }
        - in: query
          name: threshold
          required: true
          description: Порог суммы (BigDecimal)
          schema: { type: number, format: double, minimum: 0 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/SellerAggregateResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '500': { $ref: '#/components/responses/InternalError' }

  /api/v1/analytics/sellers/{id}/best-period:
    parameters:
      - $ref: '#/components/parameters/SellerId'
    get:
      tags: [Analytics]
      summary: Лучшее окно по продавцу (опциональная задача из PDF)
      description: |
        Находит окно длиной windowDays с максимальной суммой транзакций.
        Реализация — sliding window O(n) после сортировки транзакций по дате.
      operationId: getBestPeriod
      parameters:
        - in: query
          name: windowDays
          required: true
          description: Размер окна в днях
          schema: { type: integer, minimum: 1, maximum: 3650 }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BestPeriodResponse' }
        '204':
          description: У продавца нет транзакций
        '400': { $ref: '#/components/responses/BadRequest' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/InternalError' }

components:
  parameters:
    SellerId:
      in: path
      name: id
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
      description: ID продавца
    PageParam:
      in: query
      name: page
      required: false
      schema: { type: integer, minimum: 0, default: 0 }
      description: Номер страницы (0-based)
    SizeParam:
      in: query
      name: size
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 20 }
      description: Размер страницы
    SortParam:
      in: query
      name: sort
      required: false
      schema:
        type: array
        items: { type: string }
      style: form
      explode: true
      description: |
        Сортировка в формате Spring Data: `field,asc|desc`.
        Можно передавать несколько раз, например `?sort=name,asc&sort=id,desc`.

  responses:
    BadRequest:
      description: Ошибка валидации или некорректные параметры
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    NotFound:
      description: Ресурс не найден
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Conflict:
      description: Конфликт состояния (например, операция над удалённым ресурсом)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    InternalError:
      description: Внутренняя ошибка сервера
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

  schemas:
    # ---------- Enums ----------
    PaymentType:
      type: string
      enum: [CASH, CARD, TRANSFER]
      description: Тип оплаты
    PeriodType:
      type: string
      enum: [DAY, MONTH, QUARTER, YEAR]
      description: Гранулярность периода для аналитики

    # ---------- Seller ----------
    SellerCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: Иван Петров
        contactInfo:
          type: string
          maxLength: 1024
          nullable: true
          example: ivan@example.com
        registrationDate:
          type: string
          format: date-time
          nullable: true
          description: Если не передана — выставляется текущее время сервера
          example: 2026-05-15T10:30:00

    SellerUpdateRequest:
      type: object
      description: Частичное обновление. Поля, отсутствующие в запросе, не изменяются.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          nullable: true
        contactInfo:
          type: string
          maxLength: 1024
          nullable: true

    SellerResponse:
      type: object
      required: [id, name, registrationDate, createdAt, updatedAt]
      properties:
        id: { type: integer, format: int64, example: 42 }
        name: { type: string, example: Иван Петров }
        contactInfo: { type: string, nullable: true, example: ivan@example.com }
        registrationDate: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SellerAggregateResponse:
      type: object
      required: [seller, totalAmount]
      properties:
        seller: { $ref: '#/components/schemas/SellerResponse' }
        totalAmount:
          type: number
          format: double
          description: Сумма транзакций за период
          example: 12500.75

    # ---------- Transaction ----------
    TransactionCreateRequest:
      type: object
      required: [sellerId, amount, paymentType]
      properties:
        sellerId: { type: integer, format: int64, example: 42 }
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          description: Сумма транзакции (на сервере хранится как BigDecimal, scale=2)
          example: 1500.50
        paymentType: { $ref: '#/components/schemas/PaymentType' }
        transactionDate:
          type: string
          format: date-time
          nullable: true
          description: Если не передана — выставляется текущее время сервера

    TransactionResponse:
      type: object
      required: [id, sellerId, amount, paymentType, transactionDate, createdAt]
      properties:
        id: { type: integer, format: int64, example: 1001 }
        sellerId: { type: integer, format: int64, example: 42 }
        amount: { type: number, format: double, example: 1500.50 }
        paymentType: { $ref: '#/components/schemas/PaymentType' }
        transactionDate: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    # ---------- Analytics responses ----------
    TopSellerResponse:
      type: object
      required: [seller, totalAmount, period, from, to]
      properties:
        seller: { $ref: '#/components/schemas/SellerResponse' }
        totalAmount: { type: number, format: double, example: 99999.99 }
        period: { $ref: '#/components/schemas/PeriodType' }
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }

    BestPeriodResponse:
      type: object
      required: [sellerId, from, to, totalAmount, transactionCount]
      properties:
        sellerId: { type: integer, format: int64 }
        from: { type: string, format: date-time }
        to: { type: string, format: date-time }
        totalAmount: { type: number, format: double }
        transactionCount: { type: integer, format: int32 }

    # ---------- Pagination ----------
    PageMeta:
      type: object
      required: [page, size, totalElements, totalPages]
      properties:
        page: { type: integer, format: int32, example: 0 }
        size: { type: integer, format: int32, example: 20 }
        totalElements: { type: integer, format: int64, example: 137 }
        totalPages: { type: integer, format: int32, example: 7 }

    SellerPage:
      type: object
      required: [content, page]
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/SellerResponse' }
        page: { $ref: '#/components/schemas/PageMeta' }

    TransactionPage:
      type: object
      required: [content, page]
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/TransactionResponse' }
        page: { $ref: '#/components/schemas/PageMeta' }

    # ---------- Errors ----------
    FieldError:
      type: object
      required: [field, message]
      properties:
        field: { type: string, example: name }
        message: { type: string, example: must not be blank }

    ApiError:
      type: object
      required: [timestamp, status, error, message, path]
      properties:
        timestamp:
          type: string
          format: date-time
          example: 2026-05-15T12:34:56
        status:
          type: integer
          format: int32
          example: 400
        error:
          type: string
          description: Краткое описание категории ошибки
          example: Validation Failed
        message:
          type: string
          example: Поле name обязательно
        path:
          type: string
          example: /api/v1/sellers
        traceId:
          type: string
          nullable: true
          description: ID распределённого трейса (Micrometer Tracing). Используй для поиска в Tempo/Jaeger.
          example: 0af7651916cd43dd8448eb211c80319c
        fieldErrors:
          type: array
          nullable: true
          items: { $ref: '#/components/schemas/FieldError' }
